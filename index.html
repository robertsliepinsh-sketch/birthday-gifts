<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Список подарков</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Nunito, sans-serif;
    background: linear-gradient(135deg, #FFE0F0 0%, #FFF0D8 50%, #E0F0FF 100%);
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 1.8rem; font-weight: 800; color: #D1477A; margin: 8px 0 4px; }
  .header p { color: #999; font-size: 0.9rem; }
  .stats { max-width: 520px; margin: 0 auto 8px; text-align: center; color: #D1477A; font-weight: 700; font-size: 0.9rem; }
  .updated { color: #CCC; font-size: 0.75rem; margin-left: 8px; }
  .progress-bar { max-width: 520px; margin: 0 auto 20px; background: rgba(255,255,255,0.6); border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #F06292, #FF8A65); border-radius: 20px; transition: width 0.4s ease; }
  .gift-list { max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
  .gift-card {
    background: white; border-radius: 18px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    cursor: pointer; border: 2px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .gift-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.11); }
  .gift-card.taken { background: #F8F8F8; border-color: #C8E6C9; }
  .gift-card.taken .gift-name { color: #999; text-decoration: line-through; }
  .gift-icon { font-size: 2rem; width: 46px; text-align: center; flex-shrink: 0; }
  .gift-info { flex: 1; }
  .gift-name { font-weight: 700; font-size: 1rem; color: #333; line-height: 1.3; }
  .taken-by { font-size: 0.78rem; color: #4CAF50; font-weight: 700; margin-top: 3px; }
  .check-circle {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2.5px solid #DDD; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; font-size: 1.1rem;
    background: white; transition: all 0.2s;
  }
  .gift-card.taken .check-circle { background: #4CAF50; border-color: #4CAF50; color: white; }
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 100;
    justify-content: center; align-items: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white; border-radius: 24px; padding: 28px 24px;
    max-width: 360px; width: 100%; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-icon { font-size: 3rem; margin-bottom: 8px; }
  .modal h2 { font-size: 1.1rem; font-weight: 800; color: #333; margin-bottom: 8px; }
  .modal p { color: #777; font-size: 0.9rem; margin-bottom: 14px; }
  .name-input {
    width: 100%; border: 2px solid #F0C0D8; border-radius: 12px;
    padding: 12px 14px; font-size: 1rem; font-family: inherit;
    outline: none; margin-bottom: 6px; transition: border-color 0.2s;
  }
  .name-input:focus { border-color: #D1477A; }
  .name-input.error { border-color: #EF5350; }
  .err-msg { color: #EF5350; font-size: 0.8rem; margin-bottom: 8px; min-height: 18px; }
  .btn {
    width: 100%; padding: 13px; border-radius: 14px; border: none;
    font-size: 1rem; font-weight: 700; font-family: inherit;
    cursor: pointer; margin-bottom: 8px; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-confirm { background: #D1477A; color: white; }
  .btn-release { background: #FF7043; color: white; }
  .btn-cancel { background: #F0F0F0; color: #666; }
  .loading-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 40vh; color: #D1477A;
    font-size: 1.1rem; font-weight: 700;
  }
  .spinner {
    width: 40px; height: 40px; border: 4px solid #F0C0D8;
    border-top-color: #D1477A; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div style="font-size:2.2rem">🎂🎀🎁</div>
  <h1>Список подарков</h1>
  <p>Нажми на подарок, который хочешь подарить!</p>
</div>

<div id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    Загрузка...
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon" id="mIcon">🎁</div>
    <h2 id="mTitle"></h2>
    <p id="mDesc"></p>
    <input class="name-input" id="mInput" type="text" placeholder="Твоё имя" maxlength="40" style="display:none"/>
    <div class="err-msg" id="mErr"></div>
    <button class="btn btn-confirm" id="mConfirm" onclick="confirmAction()">🎀 Беру этот подарок!</button>
    <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
  </div>
</div>

<script>
const API_KEY = '$2a$10$ITkAOjPUtKTed.c2mDuK7uipApQyyowRaLA9M/DN6kbLI0WVKnqpi';
const BIN_NAME = 'birthday-gifts-2025';
const MAX_PER_PERSON = 2;
let BIN_ID = "6a2c486bf5f4af5e29e7f765";

const GIFTS = [
  { id: 'g1',  name: 'Подарочная карта в кино',                      icon: '🎬' },
  { id: 'g2',  name: 'Подарочная карта в CandyPop',                  icon: '🍬' },
  { id: 'g3',  name: 'Коробка-сюрприз из CandyPop',                  icon: '🎊' },
  { id: 'g4',  name: 'SquishMallows — Fuzzy Mallard Duck',           icon: '🦆' },
  { id: 'g5',  name: 'Игра «What Do You Meme?» (на английском)',     icon: '😂' },
  { id: 'g6',  name: 'Игрушка Fuggler (любая)',                       icon: '🧸' },
  { id: 'g7',  name: 'Подарочная карта в торговый центр',            icon: '🛍️' },
  { id: 'g8',  name: 'Squishy Dumplings игрушка',                    icon: '🥟' },
  { id: 'g9',  name: 'Комплект для ванны (пена, шарики, гель)',      icon: '🛁' },
  { id: 'g10', name: 'Подарочная карта в GanBei',                    icon: '🍜' },
  { id: 'g11', name: 'Schylling Nee Doh Nice Cube',                  icon: '🟩' },
  { id: 'g12', name: 'Ролики',                                        icon: '⛸️' },
];

let bookings = {};
let currentGift = null;
let isRelease = false;
let lastUpdated = null;

function countByName(name) {
  return Object.values(bookings).filter(n => n.toLowerCase() === name.toLowerCase()).length;
}

async function apiGet() {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { 'X-Master-Key': API_KEY }
  });
  if (!r.ok) throw new Error('get failed');
  const d = await r.json();
  return d.record;
}

async function apiSet(data) {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('put failed');
}

async function loadState() {
  try {
    const data = await apiGet();
    bookings = data ? (data.bookings || {}) : {};
    lastUpdated = new Date();
    render();
  } catch(e) {
    bookings = {};
    render();
  }
}

function render() {
  const takenCount = Object.keys(bookings).length;
  const progress = Math.round(takenCount / GIFTS.length * 100);
  const timeStr = lastUpdated
    ? lastUpdated.toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit',second:'2-digit'})
    : '';

  let html = `
    <div class="stats">
      ${takenCount} из ${GIFTS.length} подарков забронировано
      <span class="updated">${timeStr ? '• ' + timeStr : ''}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="gift-list">
  `;

  GIFTS.forEach(g => {
    const by = bookings[g.id];
    html += `
      <div class="gift-card ${by ? 'taken' : ''}" onclick="openModal('${g.id}')">
        <div class="gift-icon">${g.icon}</div>
        <div class="gift-info">
          <div class="gift-name">${g.name}</div>
          ${by ? `<div class="taken-by">✅ Берёт: ${by}</div>` : ''}
        </div>
        <div class="check-circle">${by ? '✓' : ''}</div>
      </div>
    `;
  });

  html += '</div>';
  document.getElementById('app').innerHTML = html;
}

function openModal(giftId) {
  currentGift = GIFTS.find(g => g.id === giftId);
  isRelease = !!bookings[giftId];

  document.getElementById('mIcon').textContent = currentGift.icon;
  document.getElementById('mTitle').textContent = currentGift.name;
  document.getElementById('mErr').textContent = '';

  const input = document.getElementById('mInput');
  const btn = document.getElementById('mConfirm');

  if (isRelease) {
    document.getElementById('mDesc').textContent = `Сейчас бронирует: ${bookings[giftId]}. Хочешь отменить бронь?`;
    input.style.display = 'none';
    btn.className = 'btn btn-release';
    btn.textContent = '❌ Отменить бронь';
  } else {
    document.getElementById('mDesc').textContent = 'Напиши своё имя, чтобы забронировать (можно взять до 2 подарков)';
    input.style.display = 'block';
    input.value = '';
    input.className = 'name-input';
    btn.className = 'btn btn-confirm';
    btn.textContent = '🎀 Беру этот подарок!';
    setTimeout(() => input.focus(), 100);
  }

  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  currentGift = null;
}

async function confirmAction() {
  const btn = document.getElementById('mConfirm');
  const input = document.getElementById('mInput');
  const errEl = document.getElementById('mErr');

  if (!isRelease) {
    const name = input.value.trim();
    if (!name) {
      input.className = 'name-input error';
      errEl.textContent = 'Введи своё имя!';
      return;
    }
    if (countByName(name) >= MAX_PER_PERSON) {
      errEl.textContent = `Можно взять максимум ${MAX_PER_PERSON} подарка!`;
      return;
    }
    bookings[currentGift.id] = name;
  } else {
    delete bookings[currentGift.id];
  }

  btn.disabled = true;
  btn.textContent = '⏳ Сохраняем...';
  errEl.textContent = '';

  try {
    await apiSet({ bookings });
    lastUpdated = new Date();
    render();
    closeModal();
  } catch(e) {
    errEl.textContent = 'Ошибка сохранения, попробуй ещё раз';
    if (!isRelease) delete bookings[currentGift.id];
    else bookings[currentGift.id] = input.value.trim();
    btn.disabled = false;
    btn.textContent = isRelease ? '❌ Отменить бронь' : '🎀 Беру этот подарок!';
  }
}

document.getElementById('mInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAction();
});

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadState();
setInterval(loadState, 5000);
</script>
</body>
</html>
